spring:
  flyway:
    enabled: false
  datasource:
    url: jdbc:h2:mem:khmertest;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  data:
    redis:
      host: localhost
      port: 6379
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
  cache:
    type: simple
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-client-id
            client-secret: test-client-secret
            scope:
              - email
              - profile
  ai:
    model:
      chat: google-genai
      embedding: google-genai
    google:
      genai:
        api-key: test-api-key
        chat:
          options:
            model: gemini-2.0-flash
            temperature: 0.7
        embedding:
          api-key: test-api-key
          text:
            options:
              model: text-embedding-004
              dimensions: 768
    vectorstore:
      pgvector:
        initialize-schema: false
        dimensions: 768
        distance-type: COSINE_DISTANCE
        index-type: HNSW

lms:
  uploads-dir: ./build/test-uploads
  storage:
    provider: local

jwt:
  secret: YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXoxMjM0NTY3ODkwMTIzNA==
  expiration: 3600
  refresh-expiration: 86400

minio:
  url: http://127.0.0.1:9000
  access-key: test
  secret-key: testtest
  bucket-name: test
