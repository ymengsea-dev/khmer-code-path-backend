server:
  port: 8080

spring:
  application:
    name: khmer-code-path-backend
  profiles:
    default: dev
  config:
    import: optional:file:.env[.properties]

logging:
  pattern:
    console: "%clr(%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX}){faint} %clr(%5p) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx"
