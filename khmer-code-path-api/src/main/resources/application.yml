server:
  port: 8080

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

spring:
  application:
    name: khmer-code-path-backend
  output:
    ansi:
      enabled: ALWAYS
  profiles:
    default: dev,ollama
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

  data:
    redis:
      host: ${REDIS_HOSTNAME}
      port: ${REDIS_PORT}
  cache:
    type: redis

  ai:
    model:
      # Required when both google-genai and ollama starters are on the classpath (both use matchIfMissing).
      chat: google-genai
      embedding: google-genai

    google:
      genai:
        api-key: ${GOOGLE_AI_API_KEY}
        chat:
          options:
            model: ${GOOGLE_AI_MODEL}
            temperature: 0.7
        embedding:
          api-key: ${GOOGLE_AI_API_KEY}
          text:
            options:
              model: ${OPTION_MODEL}
              dimensions: 768

    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: 768
        distance-type: COSINE_DISTANCE
        index-type: HNSW

jwt:
  secret: ${JWT_SECRET}
  expiration: ${TOKEN_EXPIRATION}
  refresh-expiration: ${REFRESH_TOKEN_EXPIRATION}

lms:
  # Lesson / library binaries are stored in MinIO only (not on the API server disk).
  storage:
    provider: minio
  ai:
    history-window: 20
    ingest-on-startup: false
  material-library:
    upload-accept: ".pdf,.pptx,.docx"
    views:
      - id: all
        label: All
        search-placeholder: Search templates and files…
      - id: templates
        label: Templates
        search-placeholder: Search templates…
      - id: files
        label: File attachments
        search-placeholder: Search file attachments…
    create-defaults:
      title: New Lesson Template
      icon-type: SLIDES
      gradient: from-violet-800 to-violet-600
    file-pool:
      label: Stored files
      max-files: 100
  classes:
    all-semesters-label: All Semesters
    card-gradients:
      - from-indigo-500 to-purple-600
      - from-blue-600 to-sky-700
      - from-emerald-600 to-teal-700
      - from-amber-500 to-orange-600
      - from-rose-500 to-pink-600
      - from-violet-600 to-fuchsia-700
    lesson-tabs:
      - id: content
        label: Lessons
      - id: materials
        label: Materials
      - id: ai
        label: AI
      - id: comments
        label: Comments
    create-defaults:
      semester: Semester 1
      academic-year: 2026

minio:
  url: ${MINIO_URL}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket-name: ${MINIO_BUCKET_NAME}

logging:
  pattern:
    console: "%clr(%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX}){faint} %clr(%5p) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx"
