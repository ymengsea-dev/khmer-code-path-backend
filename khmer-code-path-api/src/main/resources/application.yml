server:
  port: 8080

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

spring:
  application:
    name: khmer-code-path-backend
  output:
    ansi:
      enabled: ALWAYS
  profiles:
    default: dev,ollama
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/seed

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

  data:
    redis:
      host: ${REDIS_HOSTNAME}
      port: ${REDIS_PORT}
  cache:
    type: redis

  ai:
    model:
      # Required when both google-genai and ollama starters are on the classpath (both use matchIfMissing).
      chat: google-genai
      embedding: google-genai

    google:
      genai:
        api-key: ${GOOGLE_AI_API_KEY}
        chat:
          options:
            model: ${GOOGLE_AI_MODEL}
            temperature: 0.7
        embedding:
          api-key: ${GOOGLE_AI_API_KEY}
          text:
            options:
              model: ${OPTION_MODEL}
              dimensions: 768

    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: 768
        distance-type: COSINE_DISTANCE
        index-type: HNSW

jwt:
  secret: ${JWT_SECRET}
  expiration: ${TOKEN_EXPIRATION}
  refresh-expiration: ${REFRESH_TOKEN_EXPIRATION}

lms:
  # Lesson / library binaries are stored in MinIO only (not on the API server disk).
  storage:
    provider: minio
  school:
    public-base-url: http://localhost:3000
    profile-section-title: School profile
    profile-section-description: Configure your public student registration portal — share the link, branding, and signup settings.
    name-label: School name
    slug-label: Portal URL slug
    tagline-label: Tagline
    tagline-placeholder: Short welcome message on your registration page
    registration-open-label: Registration open
    save-profile-label: Save profile
    cover-image-label: Cover image
    cover-image-description: Shown as the background when students open your registration link.
    upload-cover-label: Upload cover
    remove-cover-label: Remove cover
    registration-url-label: Student registration link
    copy-url-label: Copy link
    copied-url-message: Link copied!
    registration-path-prefix: /register/
  ai:
    history-window: 20
    ingest-on-startup: false
  material-library:
    upload-accept: ".pdf,.pptx,.docx"
    views:
      - id: all
        label: All
        search-placeholder: Search templates and files…
      - id: templates
        label: Templates
        search-placeholder: Search templates…
      - id: files
        label: File attachments
        search-placeholder: Search file attachments…
    create-defaults:
      title: New Lesson Template
      icon-type: SLIDES
      gradient: from-violet-800 to-violet-600
    file-pool:
      label: Stored files
      max-files: 100
  classes:
    all-semesters-label: All Semesters
    card-gradients:
      - from-indigo-500 to-purple-600
      - from-blue-600 to-sky-700
      - from-emerald-600 to-teal-700
      - from-amber-500 to-orange-600
      - from-rose-500 to-pink-600
      - from-violet-600 to-fuchsia-700
    lesson-tabs:
      - id: content
        label: Lessons
      - id: materials
        label: Materials
      - id: ai
        label: AI
      - id: comments
        label: Comments
    create-defaults:
      semester: Semester 1
      academic-year: 2026
    grading-weights:
      attendance: 10
      assignment: 10
      quiz: 5
      midterm: 25
      final-exam: 50
    visibility-options:
      - value: PRIVATE
        label: Private (invite only)
        description: Students can join only after you invite them.
      - value: PUBLIC
        label: Public (self-enroll)
        description: Students at your school can discover and join this class from Public Courses.
    public-courses:
      page-title: Public Courses
      page-description: Browse open classes at your school and join instantly.
      nav-label: Public Courses
      empty-message: No public courses are available right now.
      enroll-button-label: Join class
      enrolled-label: Enrolled
      search-placeholder: Search public courses…
      disabled-hint: Your school administrator has not enabled public courses. Only private (invite-only) classes are available.
    settings-tabs:
      - id: general
        label: General
      - id: grading
        label: Score breakdown
      - id: students
        label: Students
      - id: lessons
        label: Lessons
      - id: quizzes
        label: Quizzes
  faculties:
    page-title: Faculty Management
    page-description: Organize your school into faculties. Each faculty has its own profile and cover image.
    section-title: Faculties
    section-description: Top-level academic divisions at your school. Departments belong to a faculty.
    name-label: Faculty name
    tagline-label: Tagline
    tagline-placeholder: Short description shown on the faculty card
    add-button-label: Add faculty
    save-button-label: Save
    configure-button-label: Edit
    search-placeholder: Search faculties…
    no-results-message: No faculties match your search.
    empty-message: No faculties yet. Add one to organize departments.
    department-count-label: Departments
    cover-image-label: Cover image
    cover-image-description: Banner image displayed on the faculty card.
    upload-cover-label: Upload cover
    remove-cover-label: Remove cover
    configure-dialog-title: Faculty profile
    configure-dialog-description: Set the name, tagline, and cover image for this faculty.
    back-to-faculties-label: Back to faculties
    card-gradients:
      - from-indigo-500 to-purple-600
      - from-blue-600 to-sky-700
      - from-emerald-600 to-teal-700
      - from-amber-500 to-orange-600
      - from-rose-500 to-pink-600
      - from-violet-600 to-fuchsia-700
  permissions:
    page-title: Roles & Permissions
    select-teacher-label: Select teacher
    save-button-label: Save permissions
    teacher-section-title: Teacher permissions
    teacher-section-description: Toggle capabilities for all teachers at your school. Changes apply on their next request.
    student-section-title: Student permissions
    student-section-description: Toggle capabilities for all students at your school. Changes apply on their next request.
    roles-section-title: School members
    roles-section-description: View every user at your school and assign their role. Changes are saved immediately.
    role-column-label: Role
    status-column-label: Status
    school-features-section-title: School features
    school-features-section-description: Enable optional capabilities for your school. Teachers only see options that are turned on here.
    public-courses-feature-label: Public courses
    public-courses-feature-description: Allow teachers to mark classes as public so students can self-enroll from the Public Courses page.
    tabs:
      - id: roles
        label: Roles
      - id: permissions
        label: Permissions
    assignable-roles:
      - role: STUDENT
        label: Student
      - role: TEACHER
        label: Teacher
      - role: ADMIN
        label: Administrator
    role-summaries:
      - role: ADMIN
        title: School Administrator
        description: Full control of the school tenant, members, and settings.
        highlights:
          - label: Manage users
            granted: true
          - label: School settings
            granted: true
          - label: Operations
            granted: true
          - label: Academic records
            granted: true
      - role: TEACHER
        title: Teacher
        description: Teaches classes and supports students. Defaults can be customized below.
        highlights:
          - label: Manage classes
            granted: true
          - label: Lessons & quizzes
            granted: true
          - label: Grades & attendance
            granted: true
          - label: User management
            granted: false
      - role: STUDENT
        title: Student
        description: Learns in enrolled classes and uses personal study tools.
        highlights:
          - label: View classes
            granted: true
          - label: Submit quizzes
            granted: true
          - label: AI chat & notebook
            granted: true
          - label: User management
            granted: false
    grantable:
      - authority: lms:usr:manage
        label: Manage users
        description: Create, import, and edit student accounts.
        default-for-teacher: false
      - authority: lms:cls:manage
        label: Manage classes
        description: Create and configure classes, enrollments, and class settings.
        default-for-teacher: true
      - authority: lms:crs:manage
        label: Manage course catalog
        description: Create and edit courses in the catalog.
        default-for-teacher: true
      - authority: lms:lsn:manage
        label: Manage lessons
        description: Create lessons and upload class materials.
        default-for-teacher: true
      - authority: lms:att:manage
        label: Manage attendance
        description: Record and update student attendance.
        default-for-teacher: true
      - authority: lms:grd:manage
        label: Manage grades
        description: Record and update student grades.
        default-for-teacher: true
      - authority: lms:ai:ingest
        label: Index materials for AI
        description: Upload and index lesson files for AI retrieval.
        default-for-teacher: true
      - authority: lms:ops:manage
        label: School operations
        description: Access inventory, requests, and infrastructure tools.
        default-for-teacher: false
      - authority: lms:school:manage
        label: School settings
        description: Edit school profile, registration portal, and permissions.
        default-for-teacher: false
    grantable-students:
      - authority: lms:ai:chat
        label: AI Chat
        description: Use the AI learning assistant.
        default-for-student: true
      - authority: lms:cls:read
        label: View classes
        description: Browse enrolled and available classes.
        default-for-student: true
      - authority: lms:crs:read
        label: View course catalog
        description: Browse courses in the catalog.
        default-for-student: true
      - authority: lms:dash:read
        label: View dashboard
        description: Access the personal learning dashboard.
        default-for-student: true
      - authority: lms:prog:read
        label: View progress
        description: Track personal learning progress.
        default-for-student: true
      - authority: lms:ai:ingest
        label: Index materials for AI
        description: Upload and index files for AI retrieval.
        default-for-student: false
      - authority: lms:lsn:manage
        label: Manage lessons
        description: Create lessons and upload class materials.
        default-for-student: false
      - authority: lms:cls:manage
        label: Manage classes
        description: Create and configure classes.
        default-for-student: false

minio:
  url: ${MINIO_URL}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket-name: ${MINIO_BUCKET_NAME}

logging:
  pattern:
    console: "%clr(%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX}){faint} %clr(%5p) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx"
