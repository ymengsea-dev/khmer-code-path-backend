# Production — keys only; values in .env on the server (see Dockerfile).
app:
  frontend-url: ${FRONTEND_URL}

spring:
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/seed
    baseline-on-migrate: true
    baseline-version: 0
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
  cache:
    type: simple
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB
  ai:
    model:
      chat: ollama
      embedding: ollama
    ollama:
      base-url: ${OLLAMA_BASE_URL}
      init:
        pull-model-strategy: ${OLLAMA_PULL_MODEL_STRATEGY}
      chat:
        options:
          model: ${OLLAMA_CHAT_MODEL}
          temperature: 0.7
      embedding:
        options:
          model: ${OLLAMA_EMBEDDING_MODEL}
    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: 768
        distance-type: COSINE_DISTANCE
        index-type: HNSW

jwt:
  secret: ${JWT_SECRET}
  expiration: ${TOKEN_EXPIRATION}
  refresh-expiration: ${REFRESH_TOKEN_EXPIRATION}

minio:
  url: ${MINIO_URL}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket-name: ${MINIO_BUCKET_NAME}

lms:
  storage:
    provider: minio
  school:
    public-base-url: ${FRONTEND_URL}
    registration-path-prefix: /register/
  ai:
    enabled: ${AI_ENABLED}
    history-window: 20
    ingest-on-startup: false
    health-check-cache-seconds: 30
    health-check-failure-cache-seconds: 15
  material-library:
    file-pool:
      max-files: 100
  classes:
    create-defaults:
      semester: Semester 1
      academic-year: 2026
    grading-weights:
      attendance: 10
      assignment: 10
      quiz: 5
      midterm: 25
      final-exam: 50
